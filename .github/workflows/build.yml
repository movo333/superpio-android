name: Build Super Pio APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gradle 8.3
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.3'

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Release APK
        run: gradle bundleRelease

      - name: Sign APK
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > superpio.keystore
          jarsigner -verbose \
            -sigalg SHA256withRSA \
            -digestalg SHA-256 \
            -keystore superpio.keystore \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.KEY_PASSWORD }}" \
            app/build/outputs/bundle/release/app-release.apk \
            "${{ secrets.KEY_ALIAS }}"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SuperPio-APK
          path: app/build/outputs/bundle/release/app-release.apk
          retention-days: 30
